[build]
  command = "node scripts/generate-firebase-config.js"
  publish = "."

# Firebase client API keys are public in the browser; the build writes them to
# firebase-config.js on purpose. Tell Netlify not to fail the deploy for that file.
[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "firebase-config.js,firebase.public.json"

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/gallery"
  to = "/gallery.html"
  status = 200

[[redirects]]
  from = "/newsletters"
  to = "/newsletters.html"
  status = 200
